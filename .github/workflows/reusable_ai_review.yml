name: 🤖 Reusable AI Code Review

on:
  workflow_call:   # ← this is what makes it reusable
    inputs:
      pr_number:
        required: true
        type: number
      repo:
        required: true
        type: string
    secrets:
      GROQ_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Run Agentic Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout CENTRAL repo (review logic lives here)
        uses: actions/checkout@v4
        with:
          repository: YOUR_GITHUB_USERNAME/ai-review-central  # ← update this
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Fetch PR diff from the CALLER repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ inputs.pr_number }} \
            --repo ${{ inputs.repo }} \
            > /tmp/pr_diff.txt
          echo "Diff lines: $(wc -l < /tmp/pr_diff.txt)"

      - name: Run AI Code Review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/github_review_runner.py \
            --diff-file /tmp/pr_diff.txt \
            --pr-number ${{ inputs.pr_number }} \
            --repo ${{ inputs.repo }}
